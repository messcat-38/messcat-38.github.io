<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>mess cat</title>
    <script>
      var params = new URLSearchParams(window.location.search)
      var path = window.location.pathname.replace(/^\//, "")
      if (path && !params.has("p")) {
        params.set("p", path)
        window.location.replace("/?" + params.toString() + window.location.hash)
      }
    </script>
  </head>
  <body></body>
</html>
